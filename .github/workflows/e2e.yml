name: E2E

on:
  push:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crmiago
          POSTGRES_USER: crmiago
          POSTGRES_PASSWORD: crmiago
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crmiago -d crmiago"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://crmiago:crmiago@localhost:5432/crmiago?schema=public
      NODE_ENV: test
      JWT_SECRET: e2e_jwt_secret
      JWT_REFRESH_SECRET: e2e_jwt_refresh_secret
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_EXPIRES_IN: 7d

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Prisma generate + migrate
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Start backend (background)
        working-directory: backend
        run: |
          nohup node server.js > server.log 2>&1 &

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3001/api
        run: npm run build

      - name: Start frontend (background)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3001/api
        run: |
          nohup npm run start > next.log 2>&1 &

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        working-directory: frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:8080
          E2E_API_URL: http://127.0.0.1:3001/api
        run: npm run test:e2e

